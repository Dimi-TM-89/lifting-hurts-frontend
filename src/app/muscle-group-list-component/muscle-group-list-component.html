<!--
  Responsive grid of muscle-group cards.
  - 1 column on phones, 2 on lg, 3 on xl — keeps cards readable across screen sizes.
  - `track muscleGroup.id` lets Angular's @for diff the list efficiently when the data
    changes (no full re-render on the same items).
  - The data comes from an Observable; AsyncPipe subscribes/unsubscribes for us.
-->
<h1 class="text-4xl font-bold">Muscle Groups</h1>
<div class="grid grid-cols-1 md:grid-cols-1 lg:grid-cols-2 xl:grid-cols-3 gap-3 mx-auto py-6">
  @for (muscleGroup of muscleGroups$ | async; track muscleGroup.id) {
    <app-muscle-group-component [muscleGroup]="muscleGroup"></app-muscle-group-component>
  }
</div>
