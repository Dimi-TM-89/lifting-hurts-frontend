<!--
  Two render branches based on auth state.
  - @if / @else is the new built-in control-flow syntax (Angular 17+) — no need to import
    NgIf, and the compiler can optimize it better than the old structural directives.
  - `user()?.nickname || user()?.name` — Auth0 doesn't guarantee a `nickname`, so we fall
    back to `name` (and the `?.` prevents a crash on the very first render before user$
    has emitted).
-->
<h1 class="text-4xl font-bold">Welcome to Lifting Hurts</h1>

@if (isAuth()) {
  <p class="text-lg text-gray-600 mt-2 mb-6">
    Hey {{ user()?.nickname || user()?.name }}, here's your progress:
  </p>
  <app-dashboard-component></app-dashboard-component>
} @else {
  <p class="text-lg text-gray-600 mt-4">Track your workouts, exercises, and muscle groups!</p>
  <p class="text-gray-500 mt-2">Log in to start tracking your progress.</p>
}
