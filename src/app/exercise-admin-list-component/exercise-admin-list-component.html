<!--
  Admin CRUD table for exercises. Same structure as the muscle-group admin table; only the
  data and one extra column (Muscle Group ID) differ.

  Note: we display the raw FK (Muscle Group ID) here instead of resolving it to a name —
  it's an admin tool, FK visibility is useful for debugging. The public exercise list does
  resolve to a name.
-->
<div class="container mx-auto mt-8">
  @if (errorMessage()) {
    <div class="rounded p-4 mb-4 text-lg bg-red-200 text-red-800 border-2 border-red-300">
      {{ errorMessage() }}
    </div>
  }

  <div class="mb-4">
    <h1 class="text-3xl">Exercises</h1>
    <div class="flex justify-end">
      <button class="px-4 py-2 rounded-md bg-sky-500 text-sky-100 hover:bg-sky-600" (click)="add()">
        Create exercise
      </button>
    </div>
  </div>

  <div class="overflow-x-auto">
    <table class="min-w-full shadow border-b border-gray-200 sm:rounded-lg">
      <thead>
        <tr>
          <th class="px-6 py-3 text-xs font-medium text-left text-gray-500 border-b bg-gray-50">
            #
          </th>
          <th class="px-6 py-3 text-xs font-medium text-left text-gray-500 border-b bg-gray-50">
            Name
          </th>
          <th class="px-6 py-3 text-xs font-medium text-left text-gray-500 border-b bg-gray-50">
            Description
          </th>
          <!-- Raw FK exposed deliberately — admin debug aid -->
          <th class="px-6 py-3 text-xs font-medium text-left text-gray-500 border-b bg-gray-50">
            Muscle Group ID
          </th>
          <th class="px-6 py-3 text-xs text-center text-gray-500 border-b bg-gray-50">&nbsp;</th>
        </tr>
      </thead>
      <tbody class="bg-white">
        @for (ex of exercises$ | async; track ex.id) {
          <tr>
            <td class="px-6 py-4 border-b border-gray-200">{{ ex.id }}</td>
            <td class="px-6 py-4 border-b border-gray-200">{{ ex.name }}</td>
            <td class="px-6 py-4 border-b border-gray-200 text-sm text-gray-500">
              {{ ex.description }}
            </td>
            <td class="px-6 py-4 border-b border-gray-200 text-sm text-gray-500">
              {{ ex.muscleGroupId }}
            </td>
            <td class="px-6 py-4 border-b border-gray-200">
              <div class="flex justify-end gap-4">
                <a
                  (click)="edit(ex.id)"
                  class="text-indigo-600 hover:text-indigo-900 cursor-pointer"
                >
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    class="w-6 h-6"
                    fill="none"
                    viewBox="0 0 24 24"
                    stroke="currentColor"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      stroke-width="2"
                      d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"
                    />
                  </svg>
                </a>
                <a (click)="delete(ex.id)" class="cursor-pointer">
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    class="w-6 h-6 text-red-600 hover:text-red-800"
                    fill="none"
                    viewBox="0 0 24 24"
                    stroke="currentColor"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      stroke-width="2"
                      d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"
                    />
                  </svg>
                </a>
              </div>
            </td>
          </tr>
        }
      </tbody>
    </table>
  </div>
</div>
