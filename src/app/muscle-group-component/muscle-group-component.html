<!--
  Card markup for one muscle group.
  - flex-col + h-full: makes every card the same height inside the parent grid even if
    descriptions are different lengths (the "View details" button stays bottom-aligned).
  - The image is wrapped in @if so cards without an imageUrl don't show a broken image icon.
  - exercises.length is shown as a teaser so users see how much content is behind each card.
-->
@if (muscleGroup) {
  <article
    class="flex flex-col justify-between h-full bg-white border-gray-200 border-2 p-6 shadow"
  >
    @if (muscleGroup.imageUrl) {
      <img
        [src]="muscleGroup.imageUrl"
        [alt]="muscleGroup.name"
        class="w-full h-48 object-cover rounded mb-3"
      />
    }
    <h1 class="text-2xl font-bold my-2">{{ muscleGroup.name }}</h1>
    <h4 class="text-md text-gray-500 my-1">{{ muscleGroup.description }}</h4>
    <p class="text-sm text-gray-400 my-2">{{ muscleGroup.exercises.length }} exercises</p>
    <p class="py-2">
      <button
        class="bg-orange-500 hover:bg-orange-700 text-white font-bold py-2 px-4 rounded"
        (click)="detail(muscleGroup.id)"
      >
        View details
      </button>
    </p>
  </article>
}
