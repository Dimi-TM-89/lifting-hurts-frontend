<!--
  Single template that serves both add and edit (heading + button label switch on the
  isAdd / isEdit flags).

  Form mechanics:
   - Template-driven via FormsModule (note the `[(ngModel)]` two-way bindings).
   - `#mgForm="ngForm"` exposes the whole form's validity to the submit button.
   - `#name="ngModel"` exposes the control's validity to its inline error message.
   - The "required" message uses `[hidden]` (not @if) so the layout doesn't shift when the
     error appears — better UX in a tight form.
   - The Image URL field is left optional on purpose (no required attribute).
   - The submit button is disabled while invalid OR while a submit is in flight, preventing
     double-submits.
-->

@if (isSubmitted && errorMessage()) {
  <div class="rounded p-4 mb-4 text-lg bg-red-200 text-red-800 border-2 border-red-300">
    {{ errorMessage() }}
  </div>
}

<h1 class="text-3xl mb-4">
  @if (isAdd) {
    Add Muscle Group
  }
  @if (isEdit) {
    Edit Muscle Group
  }
</h1>

<form (ngSubmit)="onSubmit()" #mgForm="ngForm">
  <div class="mb-6">
    <label for="name" class="block mb-2 text-sm font-medium text-gray-900">Name</label>
    <input
      type="text"
      id="name"
      name="name"
      class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5"
      placeholder="Name"
      required
      [(ngModel)]="muscleGroupData().name"
      #name="ngModel"
    />
    <!-- Hide while pristine so we don't shout "required" before the user has typed anything. -->
    <div [hidden]="name.valid || name.pristine" class="text-red-500 mt-2">Name is required</div>
  </div>

  <div class="mb-6">
    <label for="description" class="block mb-2 text-sm font-medium text-gray-900"
      >Description</label
    >
    <input
      type="text"
      id="description"
      name="description"
      class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5"
      placeholder="Description"
      required
      [(ngModel)]="muscleGroupData().description"
      #description="ngModel"
    />
    <div [hidden]="description.valid || description.pristine" class="text-red-500 mt-2">
      Description is required
    </div>
  </div>

  <!-- Image URL: optional — no required attribute, no error message -->
  <div class="mb-6">
    <label for="imageUrl" class="block mb-2 text-sm font-medium text-gray-900">Image URL</label>
    <input
      type="text"
      id="imageUrl"
      name="imageUrl"
      class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5"
      placeholder="Image URL (optional)"
      [(ngModel)]="muscleGroupData().imageUrl"
    />
  </div>

  <!-- Submit button: label changes with mode, disabled while invalid or already submitted -->
  @if (isAdd) {
    <button
      type="submit"
      [disabled]="!mgForm.form.valid || isSubmitted"
      class="text-white bg-blue-700 enabled:hover:bg-blue-800 focus:ring-4 focus:outline-none focus:ring-blue-300 font-medium rounded-lg text-sm w-full sm:w-auto px-5 py-2.5 text-center disabled:opacity-75"
    >
      Add
    </button>
  }
  @if (isEdit) {
    <button
      type="submit"
      [disabled]="!mgForm.form.valid || isSubmitted"
      class="text-white bg-blue-700 enabled:hover:bg-blue-800 focus:ring-4 focus:outline-none focus:ring-blue-300 font-medium rounded-lg text-sm w-full sm:w-auto px-5 py-2.5 text-center disabled:opacity-75"
    >
      Save
    </button>
  }
</form>
