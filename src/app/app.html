<!--
  Application shell.
  - flex-col + min-h-screen + flex-1 on <main> pushes the footer down (sticky-footer pattern)
    even when the page content is short.
  - <app-menu-component> stays at the top on every route; <router-outlet> renders the
    routed component for the current URL.
-->
<div class="flex flex-col space-y-4 min-h-screen text-black bg-gray-100">
  <app-menu-component></app-menu-component>
  <main class="container mx-auto p-4 flex-1">
    <router-outlet></router-outlet>
  </main>
</div>
