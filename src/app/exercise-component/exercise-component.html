<!--
  Exercise card.
  - Whole article is clickable (cursor-pointer + (click)) — bigger tap target than a button.
  - hover:shadow-lg + transition-shadow gives a subtle "lift on hover" affordance so users
    realize it's interactive.
  - Muscle group badge only renders when `muscleGroupName` was actually passed in
    (the parent doesn't always have the related group loaded).
  - `w-fit` on the badge prevents the pill from stretching to full card width.
-->
@if (exercise) {
  <article
    class="flex flex-col justify-between h-full bg-white border-gray-200 border-2 p-6 shadow hover:shadow-lg transition-shadow cursor-pointer"
    (click)="viewDetails()"
  >
    @if (exercise.imageUrl) {
      <img
        [src]="exercise.imageUrl"
        [alt]="exercise.name"
        class="w-full h-40 object-cover rounded mb-3"
      />
    }
    <h1 class="text-2xl font-bold my-2">{{ exercise.name }}</h1>
    <p class="text-gray-500 my-1">{{ exercise.description }}</p>
    @if (muscleGroupName) {
      <span
        class="inline-block mt-2 px-3 py-1 bg-blue-100 text-blue-700 rounded-full text-xs font-medium w-fit"
      >
        {{ muscleGroupName }}
      </span>
    }
  </article>
}
